services:
  rooterr:
    build: .
    container_name: rooterr
    restart: unless-stopped
    ports:
      - "9898:9898"
    volumes:
      - ./rooterr.toml:/config/rooterr.toml:ro
      - ./data:/data
    environment:
      ROOTERR_CONFIG: /config/rooterr.toml
    depends_on:
      - ollama

  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    restart: unless-stopped
    volumes:
      - ollama:/root/.ollama

volumes:
  ollama:
